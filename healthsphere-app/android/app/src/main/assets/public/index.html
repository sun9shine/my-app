<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#050c1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="description" content="HealthSphere — منصة الصحة الذكية | The Intelligent Health Platform">
<title>HealthSphere</title>
<link rel="manifest" href="./manifest.json">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#050c1a;color:#e0e8f5;font-family:'Tajawal',system-ui,-apple-system,sans-serif;overflow-x:hidden;-webkit-font-smoothing:antialiased}
#root{min-height:100vh}
#splash{position:fixed;inset:0;z-index:99999;background:linear-gradient(135deg,#050c1a,#0a1628,#050c1a);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .6s,transform .6s}
#splash.hide{opacity:0;transform:scale(1.05);pointer-events:none}
.sp-icon{width:88px;height:88px;border-radius:22px;background:linear-gradient(135deg,#0a1f3a,#122a4a);border:2px solid rgba(0,212,255,.3);box-shadow:0 0 40px rgba(0,212,255,.2);display:flex;align-items:center;justify-content:center;font-size:42px;margin-bottom:16px;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 40px rgba(0,212,255,.2)}50%{box-shadow:0 0 60px rgba(0,212,255,.5)}}
.sp-title{font-size:26px;font-weight:900;color:#fff;margin-bottom:6px}
.sp-sub{font-size:13px;color:#5a7a9a;margin-bottom:24px}
.sp-bar{width:160px;height:3px;background:#0c1828;border-radius:2px;overflow:hidden}
.sp-fill{height:100%;background:linear-gradient(90deg,#00d4ff,#7c3aed);border-radius:2px;animation:fill 2s ease-out forwards}
@keyframes fill{0%{width:0}60%{width:70%}100%{width:100%}}
#err-screen{display:none;position:fixed;inset:0;z-index:99999;background:#050c1a;padding:24px;overflow:auto}
.err-icon{font-size:48px;text-align:center;margin-bottom:12px}
.err-title{color:#ff4560;font-size:18px;font-weight:700;text-align:center;margin-bottom:12px}
.err-msg{color:#8aa;font-size:12px;line-height:1.8;background:#0c1828;padding:14px;border-radius:10px;white-space:pre-wrap;word-break:break-all;max-height:50vh;overflow-y:auto;margin-bottom:16px}
.err-btn{display:block;width:100%;background:linear-gradient(135deg,#00d4ff22,#7c3aed22);border:1px solid #00d4ff44;color:#00d4ff;padding:14px;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;text-align:center}
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
</head>
<body>
<div id="splash">
  <div class="sp-icon">&#x2695;&#xFE0F;</div>
  <div class="sp-title">HealthSphere</div>
  <div class="sp-sub" id="splash-sub">منصة الصحة الذكية</div>
  <div class="sp-bar"><div class="sp-fill"></div></div>
</div>
<div id="err-screen">
  <div class="err-icon">&#x26A0;&#xFE0F;</div>
  <div class="err-title" id="err-title">خطأ في التطبيق</div>
  <div class="err-msg" id="err-msg"></div>
  <button class="err-btn" onclick="location.reload()" id="err-btn">&#x1F504; إعادة التحميل</button>
</div>
<div id="root"></div>
<script>
(function(){
  var lang=localStorage.getItem('hsp_lang')||'ar';
  document.documentElement.lang=lang;
  document.documentElement.dir=lang==='ar'?'rtl':'ltr';
  if(lang==='en'){
    document.getElementById('splash-sub').textContent='The Intelligent Health Platform';
    document.getElementById('err-title').textContent='Application Error';
    document.getElementById('err-btn').innerHTML='&#x1F504; Reload App';
  }
})();
function showError(msg){
  var s=document.getElementById('splash');if(s)s.style.display='none';
  var e=document.getElementById('err-screen');if(e)e.style.display='block';
  var m=document.getElementById('err-msg');if(m)m.textContent=msg;
}
window.onerror=function(m,s,l,c,err){showError(m+'\n\nLine: '+l+'\n'+(err&&err.stack||''));return true;};
window.onunhandledrejection=function(ev){showError('Promise: '+(ev.reason&&ev.reason.message||String(ev.reason)));};
setTimeout(function(){
  var r=document.getElementById('root');
  if(r&&!r.children.length)showError(localStorage.getItem('hsp_lang')==='en'?'App failed to load. Check connection and retry.':'فشل تحميل التطبيق. تحقق من الاتصال وأعد المحاولة.');
},12000);
var obs=new MutationObserver(function(){
  var r=document.getElementById('root');
  if(r&&r.children.length>0){
    var sp=document.getElementById('splash');
    if(sp){sp.classList.add('hide');setTimeout(function(){sp.remove()},700);}
    obs.disconnect();
  }
});
obs.observe(document.getElementById('root'),{childList:true});
</script>
<script src="./app.js"></script>
</body>
</html>
