<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#050c1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>HealthSphere | منصة الصحة الذكية</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;min-height:100vh;background:#050c1a;color:#dce8ff;
  font-family:"Tajawal",system-ui,sans-serif;overflow-x:hidden;-webkit-tap-highlight-color:transparent}
#root{min-height:100vh;width:100%}
#hs-splash{position:fixed;inset:0;background:#050c1a;display:flex;flex-direction:column;
  align-items:center;justify-content:center;z-index:99999;transition:opacity .6s ease}
#hs-splash.fade{opacity:0;pointer-events:none}
.hs-ring{width:56px;height:56px;border:3px solid #163050;border-top:3px solid #00d4ff;
  border-radius:50%;animation:hs-spin .9s linear infinite;margin-bottom:20px}
@keyframes hs-spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="hs-splash">
  <div class="hs-ring"></div>
  <div style="font-size:20px;font-weight:900;color:#00d4ff;letter-spacing:1px">HealthSphere</div>
  <div style="font-size:12px;color:#4a6890;margin-top:8px">منصة الصحة الذكية</div>
  <div style="font-size:10px;color:#163050;margin-top:16px">AI-Powered · v2.0.0</div>
</div>
<div id="root"></div>
<script>
(function(){
  var splash=document.getElementById('hs-splash');
  function hideSplash(){if(splash){splash.classList.add('fade');setTimeout(function(){splash&&splash.remove();},700);}}
  // Hide after app renders or after 4s max
  window.__HS_READY=hideSplash;
  setTimeout(hideSplash,4000);
})();
</script>

    @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=Space+Grotesk:wght@400;600;700&display=swap');
    *{box-sizing:border-box;margin:0;padding:0}
    html{-webkit-text-size-adjust:100%}
    body{background:${i.bg};color:${i.text};font-family:'Tajawal',sans-serif;min-height:100vh;overflow-x:hidden}
    ::-webkit-scrollbar{width:4px;height:4px}
    ::-webkit-scrollbar-track{background:${i.surface}}
    ::-webkit-scrollbar-thumb{background:${i.accent}66;border-radius:2px}
    button{cursor:pointer;border:none;outline:none;font-family:'Tajawal',sans-serif}
    input,textarea,select{font-family:'Tajawal',sans-serif;outline:none;border:none}
    @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes glow{0%,100%{box-shadow:0 0 8px ${i.accent}44}50%{box-shadow:0 0 28px ${i.accent}88}}
    @keyframes wave{0%,100%{transform:scaleY(1)}50%{transform:scaleY(2.2)}}
    @keyframes scanLine{0%{top:-4px}100%{top:105%}}
    @keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
    .fadeIn{animation:fadeIn .35s ease forwards}
    .pulse{animation:pulse 2s infinite}
    .spin{animation:spin 1s linear infinite}
    .glow{animation:glow 2s ease-in-out infinite}
    .grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
    .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
    .grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
    @media(max-width:600px){.grid4{grid-template-columns:repeat(2,1fr)}.grid3{grid-template-columns:repeat(2,1fr)}}
    @media(max-width:400px){.grid3{grid-template-columns:1fr}.grid2{grid-template-columns:1fr}}
    .msg-ai{background:linear-gradient(135deg,#0f1f3f,#0c2040);border:1px solid ${i.accent}33;border-radius:16px 16px 16px 4px}
    .msg-user{background:linear-gradient(135deg,${i.accent2}44,${i.accent2}22);border:1px solid ${i.accent2}55;border-radius:16px 16px 4px 16px}
    .msg-doctor{background:linear-gradient(135deg,#0f3020,#0a2518);border:1px solid ${i.accent3}44;border-radius:16px 16px 16px 4px}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
    @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
    @keyframes scaleIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
    .float{animation:float 3s ease-in-out infinite}
    .wave-bar{width:4px;border-radius:2px;background:${i.accent};animation:wave .6s ease-in-out infinite}
    .nav-btn{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 10px;background:none;transition:all .2s;min-width:48px}

3. **Necrobiosis Lipoidica**: Yellow-brown, waxy patches with visible blood vessels — often painful
